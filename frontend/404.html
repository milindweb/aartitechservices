<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/shared/js/config.js"></script>
  <script src="/shared/js/seo-injector.js"></script>
  <link rel="stylesheet" href="/shared/css/style.css" />
  <link rel="stylesheet" href="/shared/css/headerfooter.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    var PAGE_CONFIG = {
      title: 'Page Not Found',
      description: 'The page you are looking for does not exist.',
    };
  </script>
  <style>
    .error-page { min-height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 4rem 2rem; }
    .error-page h1 { font-size: 6rem; margin: 0; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .error-page p { font-size: 1.2rem; color: var(--text-secondary); margin: 1rem 0 2rem; }
    .error-page .btn { display: inline-block; padding: 0.8rem 2rem; background: var(--accent); color: #fff; border-radius: 8px; text-decoration: none; }
  </style>
</head>
<body>
  <div id="header"></div>
  <section class="error-page">
    <div>
      <h1>404</h1>
      <p>The page you are looking for does not exist.</p>
      <a href="/" class="btn">Go Home</a>
    </div>
  </section>
  <div id="footer"></div>
  <script src="/shared/js/headerfooter.js" defer></script>
</body>
</html>
